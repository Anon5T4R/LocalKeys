name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libxdo-dev

      - name: Install JS deps
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Frontend testes (vitest)
        run: npm test

      - name: Rust testes (cripto + gerador)
        working-directory: src-tauri
        run: cargo test --locked

  check-windows:
    # Compila e testa no Windows também — pega código só-Windows (ex.: o clipboard
    # nativo com exclusão do histórico) que o job Ubuntu não enxerga (cfg).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install JS deps
        run: npm ci
      - name: Frontend build
        run: npm run build
      - name: Rust testes (Windows)
        working-directory: src-tauri
        run: cargo test --locked

  audit:
    # App crítico: falha o CI se alguma dependência tiver CVE conhecida (RustSec).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Instala cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit
