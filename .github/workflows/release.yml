name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serializa os jobs: os dois tentavam CRIAR o release na mesma tag ao mesmo
      # tempo e um perdia a corrida (already_exists) sem subir o artefato - mordeu
      # o LocalData v0.7.0 e o LocalAgenda v0.5.0. Com um job por vez, o primeiro
      # cria e o segundo anexa. Release ~2x mais lento, mas release nao e hot-path.
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libxdo-dev

      - name: Install JS deps
        run: npm ci

      # Testes antes de buildar: tag ruim = release falha visível, sem instalador
      # quebrado publicado (o vault de alguém depende disto estar correto).
      - name: Rust testes (cripto + gerador)
        working-directory: src-tauri
        run: cargo test --locked

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      - name: Build Tauri app
        id: build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LocalKeys ${{ github.ref_name }}"
          releaseBody: |
            ## LocalKeys ${{ github.ref_name }}

            Gerenciador de senhas **100% local e offline** — sem nuvem, sem conta,
            sem telemetria. Seus segredos ficam num arquivo `.tkeys` cifrado com
            **XChaCha20-Poly1305 + Argon2id**; a chave nunca sai do processo.

            Leia o [modelo de ameaça](https://github.com/Anon5T4R/LocalKeys/blob/main/SECURITY.md)
            antes de confiar dados reais.

            ### Downloads
            - **Windows — Instalador:** `*-setup.exe`
            - **Linux — AppImage:** `*.AppImage` (dê permissão de execução e rode)

            ### O que o app faz
            - Cofre com CRUD de logins, notas, cartões e identidades; busca,
              favoritos, lixeira, **campos personalizados** e **anexos** cifrados
            - **TOTP** (códigos de 6 dígitos com contagem regressiva) e
              **histórico de senhas** por login
            - **Relatório** local de senhas fracas/repetidas
            - **Auto-type** (digita usuário/senha no campo, sem clipboard) e
              **desbloqueio rápido** opt-in (keyring do SO)
            - **Importar** de Bitwarden (JSON claro e **cifrado**), Chrome/Edge,
              LastPass, 1Password (CSV) e KeePass (`.kdbx`); **exportar** JSON/CSV
            - Gerador de senhas e frase-senha (diceware, wordlist EFF) + força (zxcvbn)
            - Auto-lock por inatividade e ao ocultar a janela; **cópia protegida do
              histórico do Windows (Win+V)/nuvem** e limpa em 30 s; **gravação
              atômica** do cofre; **pastas** para organizar

            > **Sem recuperação:** se esquecer a master password, o vault é
            > irrecuperável — é o que o mantém seguro. Faça backup do `.tkeys`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles ${{ matrix.bundles }}

      # O upload do tauri-action nao tem retentativa: ele builda e publica no
      # MESMO passo, entao um tropeco momentaneo do GitHub joga fora 15 min de
      # build e deixa a release pela metade (aconteceu em 2026-07-19, com
      # "Error creating policy" em 5 apps de uma vez, durante um incidente do
      # Actions - os binarios estavam prontos, so o upload caiu).
      #
      # Este passo so roda quando o de cima falha, e reaproveita o que JA foi
      # compilado: nada e rebuildado.
      - name: Publicar artefato (retentativa)
        if: failure() && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          arq=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe \
                   src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [ -z "$arq" ]; then
            echo "::error::sem artefato - a falha foi no BUILD, nao no upload"
            exit 1
          fi
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
                 --title "${{ github.event.repository.name }} $GITHUB_REF_NAME" \
                 --notes "Instaladores anexados abaixo."
          for t in 1 2 3 4 5; do
            if gh release upload "$GITHUB_REF_NAME" "$arq" --clobber; then
              echo "publicado na tentativa $t"
              exit 0
            fi
            echo "tentativa $t falhou; esperando $((t * 20))s"
            sleep $((t * 20))
          done
          echo "::error::upload falhou 5 vezes seguidas"
          exit 1

  # Uma release com metade dos instaladores PARECE completa pra quem baixa -
  # foi assim que Calc e Monitor ficaram so com o .exe e o Clip so com o
  # AppImage, sem nada gritando. Este job existe pra que isso nunca passe
  # calado: ou os dois estao la, ou o release fica vermelho.
  verificar:
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Os 2 instaladores estao na release?
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          nomes=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                    --json assets -q '.assets[].name' 2>/dev/null)
          echo "Anexos na release:"
          echo "${nomes:-(nenhum)}"
          falta=0
          echo "$nomes" | grep -q -- '-setup\.exe$' \
            || { echo "::error::falta o instalador do Windows"; falta=1; }
          echo "$nomes" | grep -q -- '\.AppImage$' \
            || { echo "::error::falta o AppImage"; falta=1; }
          exit $falta
