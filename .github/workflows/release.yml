name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serializa os jobs: os dois tentavam CRIAR o release na mesma tag ao mesmo
      # tempo e um perdia a corrida (already_exists) sem subir o artefato - mordeu
      # o LocalData v0.7.0 e o LocalAgenda v0.5.0. Com um job por vez, o primeiro
      # cria e o segundo anexa. Release ~2x mais lento, mas release nao e hot-path.
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libxdo-dev

      - name: Install JS deps
        run: npm ci

      # Testes antes de buildar: tag ruim = release falha visível, sem instalador
      # quebrado publicado (o vault de alguém depende disto estar correto).
      - name: Rust testes (cripto + gerador)
        working-directory: src-tauri
        run: cargo test --locked

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LocalKeys ${{ github.ref_name }}"
          releaseBody: |
            ## LocalKeys ${{ github.ref_name }}

            Gerenciador de senhas **100% local e offline** — sem nuvem, sem conta,
            sem telemetria. Seus segredos ficam num arquivo `.tkeys` cifrado com
            **XChaCha20-Poly1305 + Argon2id**; a chave nunca sai do processo.

            Leia o [modelo de ameaça](https://github.com/Anon5T4R/LocalKeys/blob/main/SECURITY.md)
            antes de confiar dados reais.

            ### Downloads
            - **Windows — Instalador:** `*-setup.exe`
            - **Linux — AppImage:** `*.AppImage` (dê permissão de execução e rode)

            ### O que o app faz
            - Cofre com CRUD de logins, notas, cartões e identidades; busca,
              favoritos, lixeira, **campos personalizados** e **anexos** cifrados
            - **TOTP** (códigos de 6 dígitos com contagem regressiva) e
              **histórico de senhas** por login
            - **Relatório** local de senhas fracas/repetidas
            - **Auto-type** (digita usuário/senha no campo, sem clipboard) e
              **desbloqueio rápido** opt-in (keyring do SO)
            - **Importar** de Bitwarden (JSON claro e **cifrado**), Chrome/Edge,
              LastPass, 1Password (CSV) e KeePass (`.kdbx`); **exportar** JSON/CSV
            - Gerador de senhas e frase-senha (diceware, wordlist EFF) + força (zxcvbn)
            - Auto-lock por inatividade e ao ocultar a janela; **cópia protegida do
              histórico do Windows (Win+V)/nuvem** e limpa em 30 s; **gravação
              atômica** do cofre; **pastas** para organizar

            > **Sem recuperação:** se esquecer a master password, o vault é
            > irrecuperável — é o que o mantém seguro. Faça backup do `.tkeys`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles ${{ matrix.bundles }}
